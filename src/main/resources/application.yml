server:
  port: 8080

spring:
  application:
    name: offerpilot

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:file:./data/offerpilot;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

# AgentScope Java
agentscope:
  model:
    provider: dashscope
    api-key: ${DASHSCOPE_API_KEY:sk-xxx}
    model-name: qwen-max
    temperature: 0.7
    max-tokens: 4096

  agent:
    workspace: ./workspace
    state-store: redis
    compaction:
      enabled: true
      max-tokens: 8000

  knowledge:
    base-path: ./workspace/knowledge
    embedding-model: text-embedding-v3
    chunk-size: 500
    chunk-overlap: 50
    top-k: 5
    auto-init: true

# App config
app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-in-production}
    expiration-ms: 86400000

  milvus:
    host: localhost
    port: 19530
    connect-timeout-ms: 10000
    keep-alive-time-ms: 55000
    database: offerpilot

  redis:
    host: localhost
    port: 6379
    password:
    timeout-ms: 5000
    session-ttl-minutes: 30
    search-cache-ttl-minutes: 10

  upload-dir: ./uploads
  allowed-file-types: pdf,mp3,wav,m4a,txt,md,docx

  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100

logging:
  file:
    path: ./logs
    name: offerpilot
  level:
    root: INFO
    com.tutorial.offerpilot: DEBUG
    com.tutorial.offerpilot.controller: INFO
    io.agentscope: INFO
    io.milvus: INFO
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
