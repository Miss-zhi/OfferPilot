server:
  port: 8080

spring:
  application:
    name: offerpilot

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/offerpilot?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_ROOT_PASSWORD:root123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

# AgentScope Java
agentscope:
  model:
    provider: dashscope
    api-key: ${DASHSCOPE_API_KEY:sk-xxx}
    base-url: https://dashscope.aliyuncs.com
    model-name: qwen3.5-plus
    temperature: 0.7
    max-tokens: 4096

  agent:
    workspace: ./workspace
    state-store: redis
    compaction:
      enabled: true
      max-tokens: 8000

  knowledge:
    base-path: ./workspace/knowledge
    embedding-model: text-embedding-v3
    chunk-size: 500
    chunk-overlap: 50
    top-k: 5
    auto-init: true

  # Embedding 独立配置 — 与 LLM Model 解耦
  # 当 LLM 切换到 DeepSeek 等不支持 Embedding 的 Provider 时，
  # 只需配置 EMBEDDING_API_KEY 指向 DashScope/OpenAI 等，无需改动模型 Key
  embedding:
    api-key: ${EMBEDDING_API_KEY:${DASHSCOPE_API_KEY:}}
    provider: dashscope
    base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding

  # 录音转写独立配置 — 与 LLM Model 解耦
  # 使用 DashScope Paraformer（OpenAI 兼容 /v1/audio/transcriptions 端点）
  # api-key 优先级: TRANSCRIPTION_API_KEY > DASHSCOPE_API_KEY > model.api-key（代码回退）
  transcription:
    api-key: ${TRANSCRIPTION_API_KEY:${DASHSCOPE_API_KEY:}}
    model: paraformer-v2
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

  # AgentScope Studio — 实时监控与 Trace
  # 接入 Studio 后可实时查看 Agent 消息流、工具调用参数/耗时/返回结果、Token 消耗等。
  # 默认关闭；开发/调试时设置 enabled: true 并启动 Studio 服务即可。
  studio:
    enabled: true
    url: http://localhost:8000
    project: OfferPilot

# App config:
app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-in-production}
    expiration-ms: 86400000

  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY:dev-key-change-in-production}

  milvus:
    host: localhost
    port: 19530
    connect-timeout-ms: 10000
    keep-alive-time-ms: 55000
    database: offerpilot

  redis:
    host: localhost
    port: 6379
    password:
    timeout-ms: 5000
    session-ttl-minutes: 30
    search-cache-ttl-minutes: 10

  upload-dir: ./uploads
  allowed-file-types: pdf,mp3,wav,m4a,txt,md,docx

  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100

logging:
  file:
    path: ./logs
    name: offerpilot
  level:
    root: INFO
    com.tutorial.offerpilot: DEBUG
    com.tutorial.offerpilot.controller: INFO
    io.agentscope: INFO
    io.milvus: INFO
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
