      template: |
        ## AgentScopeProperties
        > 标注 @ConfigurationProperties(prefix="agentscope") 和关键属性映射（model, agent, knowledge）
        > 对应 application.yml 中的 agentscope.* 配置项

        ## ModelConfig
        > 标注 Model Bean 的构建方式和 DashScope provider 配置

        ## SecurityConfig
        > 标注 @EnableWebSecurity + SecurityFilterChain Bean 的配置链
        > 说明 JWT 无状态策略（SessionCreationPolicy.STATELESS）、CSRF 禁用、接口权限矩阵

