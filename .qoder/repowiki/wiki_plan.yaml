knowledgecard:
  notes:
    - text: "OfferPilot 的模块边界划分：controller/ (REST 接口层，7 个 Controller) → service/ (业务逻辑层，15+ Service) → agent/ (AgentScope 框架层，AgentFactory + 13 @Tool + 2 Middleware) → entity/repository/ (数据访问层，18 个 JPA Entity + 15 个 Repository)。Controller 不直接访问 Repository，所有数据操作通过 Service 层编排。"
      author: "system"
    - text: "配置管理采用多环境策略：application.yml（公共配置）+ application-dev.yml（开发环境，H2 + DEBUG 日志）+ application-prod.yml（生产环境，MySQL + INFO 日志）。敏感信息（API Key、JWT Secret）通过环境变量注入，不在配置文件中硬编码。"
      author: "system"
    - text: "AgentScope v2 的 HarnessAgent 是主入口，通过 builder 模式构建，支持 enablePlanMode()（断点续聊 + todo 管理）和 enableTaskList()（注册 todo_write 元工具）。MiddlewareBase 接口提供 5 个插桩点（onAgent/onSystemPrompt/onReasoning/onActing/onModelCall），采用洋葱模式，必须调用 next.apply(input) 才能继续链。"
      author: "system"
    - text: "RAG 知识库采用多租户架构：PUBLIC 公共库（管理员创建，所有人可用）+ PRIVATE 私有库（用户创建，仅自己可见）。Agent 检索时自动联合搜索公共库和用户私有库。Milvus 采用动态 Collection 创建，所有 Collection 共用通用 Schema（通过 tags 和 metadata_json 区分不同文档元数据）。"
      author: "system"
    - text: "测试体系分为四层：单元测试（JUnit 5 + Mockito）、集成测试（Testcontainers 启动真实 Docker 容器 MySQL/Milvus/Redis）、API 端点测试（REST Assured + MockMvc）、安全测试（@WithMockUser）。测试数据约定：create_by='test' 或 id>=99000。"
      author: "system"
    - text: "异常体系：BusinessException 基类（errorCode + message）→ 5 个业务子类分别对应 HTTP 状态码（DuplicateUserException→409, InvalidCredentialsException→401, AccountDisabledException→403, RateLimitException→429, AgentTimeoutException→504）。GlobalExceptionHandler (@RestControllerAdvice) 统一捕获并返回 ApiResponse。"
      author: "system"
