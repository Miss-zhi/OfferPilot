version: 1

# ============================================================
# OfferPilot Repo Wiki & Knowledge Card 构建计划
# 面向后端开发新人的技术入门与架构理解
# ============================================================

scope:
  include:
    - "src/**"
    - "Documents/**"
    - "web/**"
    - "workspace/**"
    - "pom.xml"
    - "docker-compose.yml"
    - ".env"
  exclude:
    - "target/**"
    - "logs/**"
    - "node_modules/**"
    - "**/*.log.gz"
    - "**/*.class"

repowiki:
  template: architecture

  notes:
    - text: "OfferPilot 是基于 Spring Boot 3.2.5 + AgentScope Java v2 (2.0.0-RC5) 构建的智能求职辅导 AI 平台。核心技术栈：Spring MVC (Servlet)、JPA + Hibernate、Milvus 2.4.6 向量数据库、Redis 7 缓存/限流、DashScope LLM + Embedding、Spring Security + JWT (jjwt 0.12.5) 无状态认证、Maven 构建。包名 com.tutorial.offerpilot，单模块项目。"
      author: "system"
    - text: "AgentScope 核心概念：ReActAgent 是 AgentScope v2 的主 Agent 类型，通过 HarnessAgent.builder() 构建。推理循环为 Reasoning（LLM 思考）→ Action（工具调用）→ Observation（结果反馈）的循环。@Tool 注解标记工具方法，Toolkit.registerTool() 注册。SubagentsMiddleware 管理子 Agent 的 spawn/resume，子 Agent 从主 Agent Toolkit 中按 tools() 白名单获取过滤副本。"
      author: "system"
    - text: "工具与 LLM 职责分离是核心设计原则：@Tool 方法返回结构化 POJO（定义在 dto/tool/ 包），提供数据查询、计算、指导文本，不硬编码评分规则或评语模板。所有自然语言生成（评分、评语、建议、面试题文本）由 LLM 在对话中动态完成。示例：analyze_answer 返回 AnswerAnalysisResult（含 guidance 指导文本），LLM 据此生成评分和评语。"
      author: "system"
    - text: "多 Agent 协作范式：1 主 Agent (offerPilotCoach) + 7 子 Agent (resume_coach, tech_evaluator, expression_evaluator, mock_interviewer, company_researcher, study_planner, salary_advisor)。主 Agent 只做调度（spawn/resume_subagent），严禁直接调用业务工具。子 Agent 各负责 2-3 个工具，并发执行（如 tech_evaluator 和 expression_evaluator 可并行评估同一回答）。"
      author: "system"
    - text: "配置类扫描路径：config/ 包下含 AgentScopeProperties (@ConfigurationProperties prefix=agentscope)、ModelConfig (LLM Model Bean)、SecurityConfig (@EnableWebSecurity, Servlet 栈)、MilvusConfig (MilvusServiceClient Bean)、MilvusProperties (@ConfigurationProperties prefix=app.milvus)、RedisConfig、AsyncConfig (@EnableAsync + ingestionExecutor 线程池)、WebConfig (CORS)。API Key 通过环境变量 ${DASHSCOPE_API_KEY} 注入，JWT Secret 通过 ${JWT_SECRET} 注入。"
      author: "system"
    - text: "记忆体系两层架构：短期会话记忆由 RedisAgentStateStore 管理（TTL 30 分钟，key 格式 session:{sessionId}:messages），长期用户记忆存储在 MySQL op_user_memory 表（按 userId 隔离，5 类记忆：PROFILE/WEAK_POINT/PREFERENCE/PLAN/GENERAL）。MemoryInjectMiddleware 在每次推理前通过 onSystemPrompt 钩子从 DB 动态加载记忆拼入 system prompt，解决 Agent 被 Caffeine 缓存 30 分钟期间记忆不更新的竞态问题。"
      author: "system"
    - text: "RAG 全链路：离线阶段：文件上传 → DocumentParser 多格式解析(PDF/DOCX/MD/TXT) → DocumentChunker 4 种分块策略(AUTO/BY_QUESTION/BY_HEADING/BY_SIZE) → EmbeddingService (DashScope text-embedding-v3, 1024维) → DocumentIngestionService 异步入库管道(PARSING→CHUNKING→EMBEDDING→INDEXING→ACTIVE) → Milvus IVF_FLAT 索引。在线阶段：KnowledgeBaseService.searchWithTenant() 多租户检索（公共库 + 用户私有库联合搜索）→ 向量检索(COSINE相似度) + 标量过滤(tags) → 合并排序取 Top-K → Fallback 规则(total==0 或 relevanceScore<0.6 时触发 MCP web_search)。"
      author: "system"
    - text: "六个核心求职环节：(1)简历诊断—resume_coach 调用 parse_resume+evaluate_resume+search_questions；(2)模拟面试—mock_interviewer 调用 generate_next_question+search_answers+analyze_answer；(3)面试录音分析—主Agent 调用 transcribe_audio 后并行 spawn tech_evaluator+expression_evaluator；(4)公司面试情报—company_researcher 调用 search_company_info+search_questions；(5)学习计划—study_planner 调用 track_progress+search_learning_resources+search_questions；(6)薪资谈判—salary_advisor 调用 search_salary_data+compare_offers+generate_negotiation_script。"
      author: "system"
    - text: "所有时序图和架构图均使用 Mermaid 语法在 Markdown 中绘制，确保在 GitHub/GitLab 等平台上直接渲染。"
      author: "system"

  documents:
    - title: "系统技术架构总览"
      goal: "提供 OfferPilot 系统的整体技术架构蓝图，帮助新人快速建立全局认知。包含分层架构图、技术组件关系图、部署拓扑图。"
      parent: ""
      hints: "从 Documents/02-系统架构设计说明书.md §1 获取架构图参考，结合 docker-compose.yml 的 6 个基础设施服务、AGENTS.md 的项目结构、application.yml 的配置分层来绘制。"
      template: |
        ## 系统分层架构
        > 绘制前端→Spring Boot→AgentScope→工具层→基础设施 五层架构 Mermaid 图

        ## 技术栈全景
        > 以表格列出各层技术选型及版本号

        ## 部署拓扑
        > 绘制 Docker Compose 6 服务编排关系的 Mermaid 图（app + Milvus + etcd + MinIO + MySQL + Redis）

        ## 项目包结构导航
        > 以树形图展示 src/main/java/com/tutorial/offerpilot/ 的包结构，标注各包职责

    - title: "AgentScope 核心机制深度解析"
      goal: "深度解析 ReActAgent 推理循环、@Tool 工具定义与动态激活、多 Agent 协作范式与 Msg 消息流转。适合新人理解智能体框架的底层原理。"
      parent: ""
      hints: "从 Documents/02-系统架构设计说明书.md §2 获取 @Tool 定义示例，§4 获取多 Agent 协作设计。从 Documents/04-实现与编码规范.md §3.1 AgentFactory 获取构建流程，§4 获取 Middleware 洋葱模式。从 src/main/java/com/tutorial/offerpilot/agent/ 包读取实际源码。"
      template: |
        ## ReActAgent 推理循环
        > 绘制 Reasoning → Action → Observation 循环的 Mermaid 流程图
        > 说明 HarnessAgent.builder() 构建链的关键配置项（sysPrompt, model, toolkit, subagent, middleware, stateStore, compaction, memory）

        ## @Tool 工具定义与动态激活
        > 以 QuestionSearchTool 为例，展示 @Component + @Tool 注解的完整代码结构
        > 说明 Toolkit.registerTool() 注册机制、Toolkit.registerMetaTool() 元工具
        > 绘制 13 个本地 @Tool + MCP web_search 的工具全景表格（名称、类别、返回类型、依赖注入）

        ## 多 Agent 协作范式
        > 绘制主 Agent + 7 子 Agent 的父子关系 Mermaid 图
        > 说明 SubagentsMiddleware 的 spawn/resume 机制
        > 说明子 Agent 从主 Toolkit 按 tools() 白名单获取过滤副本的机制
        > 列出 7 个子 Agent 的 SubagentDeclaration 定义（名称、描述、SysPrompt 摘要、工具白名单）

        ## Msg 消息流转路径
        > 绘制用户消息 → Controller → AgentFactory.getOrCreateAgent() → RuntimeContext → Agent.call()/streamEvents() → Middleware 链 → LLM 推理 → 返回 Msg 的完整流转 Mermaid 时序图

    - title: "Spring Boot 集成架构"
      goal: "梳理 Agent 组件在 Spring 容器中的 Bean 注入方式、配置类的扫描路径、LLM 模型初始化与 API 密钥的安全配置管理。帮助新人理解 AgentScope 如何嵌入 Spring 生态。"
      parent: ""
      hints: "从 Documents/04-实现与编码规范.md §1 application.yml 获取配置结构，§3.1-3.2 获取 AgentFactory 和 MilvusConfig Bean 定义。从 src/main/java/com/tutorial/offerpilot/config/ 包读取所有配置类源码。从 .env 文件获取环境变量注入方式。"
      template: |
        ## Agent 组件 Bean 注入方式
        > 以 AgentFactory 为例，展示 @Component + 构造器注入 13 个 @Tool Bean 的完整模式
        > 说明 Caffeine Cache（maximumSize=500, expireAfterAccess=30min）管理 Agent 池的机制
        > 展示 RuntimeContext（userId, sessionId）的构建与传递路径

        ## 配置类扫描路径
        > 以表格列出 config/ 包下所有配置类的职责和关键 Bean 定义

        ## LLM 模型初始化
        > 展示 agentscope.model.* 配置项 → AgentScopeProperties (@ConfigurationProperties) → Model Bean 的构建链路
        > 说明 Model Bean 的 provider (dashscope)、model-name (qwen-max)、temperature、max-tokens 配置

        ## API 密钥安全配置
