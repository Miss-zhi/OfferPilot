        > 标注权限控制（薪资信息敏感）和多步骤决策辅助流程

    - title: "关键配置类代码导读"
      goal: "对 7 个配置类和 AgentFactory 进行代码导读，标注关键 Bean 定义和配置项，帮助新人快速定位和修改系统配置。"
      parent: ""
