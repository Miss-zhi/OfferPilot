        ## 成本估算
        > 以表格展示 Embedding 和 LLM 调用的成本估算

    - title: "六大核心求职环节 Agent 交互时序"
      goal: "以 Mermaid 时序图展示简历诊断、模拟面试、面试录音分析、公司面试情报、学习计划、薪资谈判六个核心求职环节的多 Agent 交互流程。帮助新人理解分布式 Agent 协作的实战模式。"
      parent: ""
      hints: "从 Documents/01-需求规格说明书.md §3 获取 4 个示例对话流程。从 Documents/02-系统架构设计说明书.md §4 获取 7 个子 Agent 的定义和工具分配。结合 AgentFactory 中的 SubagentDeclaration 定义，绘制每个环节的完整交互时序。"
      template: |
        ## 环节一：简历智能诊断
